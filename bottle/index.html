<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bottle Components Demo</title>
    <link rel="stylesheet" href="bottle.css">
</head>
<body>
    <h1>1. 基础瓶子 (可控制内部元素)</h1>
    <div class="main" id="basic-bottles"></div>

    <h1>1.5 三叶草 vs 四叶草</h1>
    <div class="main" id="clover-bottles"></div>

    <h1>1.6 叶子颜色自定义</h1>
    <div class="main" id="clover-colors"></div>

    <h1>1.7 瓶子大小对比</h1>
    <div class="main" id="size-bottles"></div>

    <h1>2. 水颜色主题</h1>
    <div class="main" id="colored-bottles"></div>

    <h1>3. 仅水色变化</h1>
    <div class="main" id="water-only-bottles"></div>

    <h1>4. 自定义颜色 (实时修改)</h1>
    <div class="main" id="custom-bottles"></div>
    <div style="text-align:center">
        <button onclick="updateColor()">切换颜色</button>
    </div>

    <h1>5. 动画控制</h1>
    <div class="main" id="animation-bottles"></div>
    <div style="text-align:center">
        <button onclick="toggleAnimation()">暂停/播放</button>
    </div>

    <h1>6. 四叶草浮动动画</h1>
    <div class="main" id="float-bottles"></div>
    <div style="text-align:center">
        <button onclick="floatClover()">浮动</button>
        <button onclick="resetClover()">重置</button>
        <button onclick="addClover()">添加叶子</button>
        <button onclick="removeClover()">删除叶子</button>
    </div>

    <h1>7. 水母添加/删除</h1>
    <div class="main" id="jellyfish-bottles"></div>
    <div style="text-align:center">
        <button onclick="addJellyfish()">添加水母</button>
        <button onclick="removeJellyfish()">删除水母</button>
    </div>

    <h1>8. 水母颜色自定义</h1>
    <div class="main" id="jellyfish-colors"></div>

    <script src="bottle.js"></script>
    <script>
        // 1. 基础瓶子 - 控制内部元素显示
        const basicBottles = new BottleCollection('#basic-bottles');
        basicBottles
            .add({ showClover: true, showJellyfish: true, showBubbles: true })
            .add({ showClover: false, showJellyfish: true, showBubbles: true })
            .add({ showClover: true, showJellyfish: false, showBubbles: true })
            .add({ showClover: true, showJellyfish: true, showBubbles: false })
            .add({ showClover: false, showJellyfish: false, showBubbles: false });

        // 1.5 三叶草和四叶草对比
        const cloverBottles = new BottleCollection('#clover-bottles');
        cloverBottles
            .add({ cloverType: 'four', showClover: true })
            .add({ cloverType: 'three', showClover: true });

        // 1.6 叶子颜色自定义
        const cloverColorBottles = new BottleCollection('#clover-colors');
        cloverColorBottles
            .add({ cloverColor: '#2cb62c' })
            .add({ cloverColor: '#ff6b6b' })
            .add({ cloverColor: '#ffd93d' })
            .add({ cloverColor: '#6bcb77' })
            .add({ cloverColor: '#4d96ff' })
            .add({ cloverColor: '#9b59b6' });

        // 2. 瓶子大小对比
        const sizeBottles = new BottleCollection('#size-bottles');
        sizeBottles
            .add({ size: 'small' })
            .add({ size: 'medium' })
            .add({ size: 'large' });

        // 3. 颜色主题
        const coloredBottles = new BottleCollection('#colored-bottles');
        coloredBottles.addColorSet();

        // 3. 仅水色变化
        const waterOnlyBottles = new BottleCollection('#water-only-bottles');
        waterOnlyBottles.addWaterOnlySet();

        // 4. 自定义颜色 - 实时修改演示
        const customBottles = new BottleCollection('#custom-bottles');
        let colorIndex = 0;
        const colorOptions = [
            PRESET_COLORS.purple,
            PRESET_COLORS.coral,
            PRESET_COLORS.teal
        ];
        
        const customBottle = new Bottle(customBottles.container, { 
            customColors: colorOptions[0] 
        });
        customBottle.render();
        customBottles.getBottles().push(customBottle);

        window.updateColor = function() {
            colorIndex = (colorIndex + 1) % colorOptions.length;
            customBottle.setCustomColors(colorOptions[colorIndex]);
        };

        // 5. 动画控制
        const animBottles = new BottleCollection('#animation-bottles');
        animBottles.addMultiple(3, { color: 'blue' });
        
        let isPaused = false;
        window.toggleAnimation = function() {
            isPaused = !isPaused;
            animBottles.getBottles().forEach(bottle => {
                const element = bottle.getElement();
                if (element) {
                    const animatedElements = element.querySelectorAll('.bubble, .cloverTop, .cloverBottom, .branch, .jellyfish, .jellyfish_head, .jellyfish_tail');
                    animatedElements.forEach(el => {
                        el.style.animationPlayState = isPaused ? 'paused' : 'running';
                    });
                }
            });
        };
        
        // 6. 四叶草浮动动画
        const floatBottles = new BottleCollection('#float-bottles');
        floatBottles.add({ showClover: true, cloverType: 'four', cloverCount: 1 })
                   .add({ showClover: true, cloverType: 'three', cloverCount: 1 });

        window.floatClover = function() {
            floatBottles.getBottles().forEach(bottle => {
                bottle.floatClover(3);
            });
        };

        window.resetClover = function() {
            floatBottles.getBottles().forEach(bottle => {
                bottle.resetClover();
            });
        };

        window.addClover = function() {
            floatBottles.getBottles().forEach(bottle => {
                bottle.addClover();
            });
        };

        window.removeClover = function() {
            floatBottles.getBottles().forEach(bottle => {
                bottle.removeClover();
            });
        };

        // 7. 水母添加/删除
        const jellyfishBottles = new BottleCollection('#jellyfish-bottles');
        jellyfishBottles.add({ showJellyfish: true, jellyfishCount: 1, showClover: false });

        window.addJellyfish = function() {
            jellyfishBottles.getBottles().forEach(bottle => {
                bottle.addJellyfish();
            });
        };

        window.removeJellyfish = function() {
            jellyfishBottles.getBottles().forEach(bottle => {
                bottle.removeJellyfish();
            });
        };

        // 8. 水母颜色自定义
        const jellyfishColors = new BottleCollection('#jellyfish-colors');
        jellyfishColors
            .add({ jellyfishColor: '#ffffff', showJellyfish: true, showClover: false })
            .add({ jellyfishColor: '#ff6b6b', showJellyfish: true, showClover: false })
            .add({ jellyfishColor: '#ffd93d', showJellyfish: true, showClover: false })
            .add({ jellyfishColor: '#6bcb77', showJellyfish: true, showClover: false })
            .add({ jellyfishColor: '#4d96ff', showJellyfish: true, showClover: false })
            .add({ jellyfishColor: '#9b59b6', showJellyfish: true, showClover: false });
    </script>
    <style>
        h1 {
            text-align: center;
            margin-top: 40px;
            color: #333;
            font-family: sans-serif;
        }
        button {
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
            background: #333;
            color: white;
            border: none;
            border-radius: 5px;
            margin: 10px;
        }
        button:hover {
            background: #555;
        }
    </style>
</body>
</html>
